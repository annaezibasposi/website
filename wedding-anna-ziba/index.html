<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anna & Ziba Wedding</title>

  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <div class="lang">
      <button onclick="setLang('fr')">FR</button>
      <button onclick="setLang('it')">IT</button>
    </div>
  </header>

  <section id="home">
    <div class="hero">
      <h1>Anna & Ziba</h1>
      <p id="subtitle"></p>
    </div>

    <div class="quote" id="bibleQuote"></div>

    <div class="countdown">
      <h2 id="countdownTitle"></h2>
      <div id="countdown"></div>
    </div>

    <div class="media">
      <h3>Playlist</h3>
      <div id="playlist"></div>

      <h3>Cinema</h3>
      <div id="cinema"></div>
    </div>
  </section>

  <section id="info">
    <h2 id="infoTitle"></h2>

    <div class="card">
      <h3>💒 Celebrazione</h3>
      <div id="churchMap"></div>
      <p id="churchInfo"></p>
    </div>

    <div class="card">
      <h3>🍷 Ricevimento</h3>
      <div id="venueMap"></div>
      <p id="venueInfo"></p>
    </div>

    <div class="card">
      <h3>🏨 Pernottamento</h3>
      <p id="stayInfo"></p>
    </div>
  </section>

  <section id="gifts">
    <h2>Lista nozze</h2>
    <div id="giftList"></div>
  </section>

  <section id="rsvp">
    <h2>RSVP</h2>
    <a id="rsvpLink" href="#" target="_blank">Répondre / Rispondere</a>
  </section>

  <section id="about">
    <h2>Gli sposi</h2>
    <p id="aboutText"></p>

    <h3>Mini game 🎮</h3>
    <canvas id="game" width="400" height="400"></canvas>
  </section>

  <script src="data.js"></script>
  <script src="game.js"></script>
  <script src="app.js"></script>
</body>
</html>
